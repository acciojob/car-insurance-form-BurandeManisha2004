<!DOCTYPE html>
<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>

<form action="" method="post">

	<label for="name">Name</label>
	<input type="text" id="name" name="name" placeholder="Name" required>

	<label for="email">Email</label>
	<input type="email" id="email" name="email" placeholder="Email" required>

	<label>Gender</label>
	<input type="radio" id="g-m" name="gender" value="male" required>
	<label for="g-m">Male</label>

	<input type="radio" id="g-f" name="gender" value="female" required>
	<label for="g-f">Female</label>

	<label for="cars">Select Car Brand</label>
	<select id="cars" name="car" required>
		<option value="">--Select--</option>
		<option value="bmw">BMW</option>
		<option value="audi">Audi</option>
		<option value="mercedes">Mercedes</option>
	</select>

	<label for="carage">Car Age</label>
	<input type="number" id="carage" name="car_age" placeholder="1234" required>

	<label for="dop">Date Of Purchase</label>
	<input type="date" id="dop" name="dop" required>

	<label for="password">Password</label>
	<input type="password" id="password" name="password" placeholder="Password" required>

	<button type="submit">Submit</button>

</form>

<script src="./script.js"></script>

</body>

</html>
